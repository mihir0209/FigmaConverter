version: "3.9"

services:
  figma-converter:
    build: .
    ports:
      - "8000:8000"
    environment:
      - FIGMA_API_TOKEN=${FIGMA_API_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MAX_THREADS=3
      - LOG_LEVEL=INFO
      - AI_CACHE_ENABLED=true
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mcp-stdio:
    build: .
    command: python mcp_server.py
    environment:
      - FIGMA_API_TOKEN=${FIGMA_API_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  mcp-sse:
    build: .
    command: python mcp_server.py --transport sse --port 3845
    ports:
      - "3845:3845"
    environment:
      - FIGMA_API_TOKEN=${FIGMA_API_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - FIGMA_MCP_API_KEY=${FIGMA_MCP_API_KEY}
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  worker:
    build: .
    command: python worker.py
    environment:
      - FIGMA_API_TOKEN=${FIGMA_API_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    depends_on:
      - figma-converter